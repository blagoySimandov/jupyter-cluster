---
# Runs on [gpu_nodes]. To add GPU support to a new worker:
#   1. Add the host to [workers] in inventory.ini
#   2. Add the same hostname under [gpu_nodes:children] in inventory.ini
- name: Configure GPU nodes (NVIDIA drivers + CUDA toolkit)
  hosts: gpu_nodes
  become: true
  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install kernel headers (DKMS needs these to compile nvidia.ko)
      ansible.builtin.apt:
        name: linux-headers-{{ ansible_kernel }}
        state: present

    - name: Install NVIDIA driver and CUDA toolkit
      ansible.builtin.apt:
        name:
          - nvidia-driver-{{ nvidia_driver_version }}
          - nvidia-cuda-toolkit
        state: present

    - name: Set CUDA_HOME for build tools (cmake, pip install, etc.)
      ansible.builtin.copy:
        dest: /etc/profile.d/cuda.sh
        mode: "0644"
        content: |
          export CUDA_HOME=/usr
          export PATH=/usr/lib/cuda/bin${PATH:+:$PATH}
          export LD_LIBRARY_PATH=/usr/lib/cuda/lib64${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}

    - name: Enable nvidia-persistenced (reduces GPU init latency for Jupyter/Slurm)
      ansible.builtin.systemd:
        name: nvidia-persistenced
        enabled: true
        state: started
      ignore_errors: true

    - name: Check if NVIDIA kernel module is loaded
      ansible.builtin.shell: lsmod | grep -q "^nvidia "
      register: nvidia_module
      changed_when: false
      failed_when: false

    - name: Warn if NVIDIA module not loaded (reboot required)
      ansible.builtin.debug:
        msg: "NVIDIA kernel module not loaded. Run: make reboot-workers && make verify"
      when: nvidia_module.rc != 0

    - name: Verify GPU access with nvidia-smi
      ansible.builtin.command: nvidia-smi
      register: nvidia_smi_out
      changed_when: false
      failed_when: nvidia_smi_out.rc != 0 and nvidia_module.rc == 0
      tags: verify

    - name: Display nvidia-smi output
      ansible.builtin.debug:
        var: nvidia_smi_out.stdout_lines
      when: nvidia_smi_out.rc == 0
      tags: verify

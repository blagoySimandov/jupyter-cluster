---
# Aligns UIDs/GIDs on worker to match master node.
# master node: master=1000, blagoy=1001
# worker node (broken): blagoy=1000, master=1001  → swap needed
#
# Run ONLY when no user is logged into the worker (usermod fails on active sessions).
- name: Fix UID/GID mismatch on worker
  hosts: workers
  become: true
  gather_facts: false
  tasks:
    - name: Swap UIDs/GIDs to match master node layout
      ansible.builtin.shell: |
        set -e

        # Step 1: move blagoy out of the way
        groupmod -g 9999 blagoy
        usermod  -u 9999 blagoy
        find /home/blagoy -user 1000 -exec chown -h 9999 {} +
        find /home/blagoy -group 1000 -exec chgrp -h 9999 {} +

        # Step 2: master → UID/GID 1000  (now free)
        groupmod -g 1000 master
        usermod  -u 1000 master
        find /home/master -user 1001 -exec chown -h 1000 {} +
        find /home/master -group 1001 -exec chgrp -h 1000 {} +

        # Step 3: blagoy → UID/GID 1001  (now free)
        groupmod -g 1001 blagoy
        usermod  -u 1001 blagoy
        find /home/blagoy -user 9999 -exec chown -h 1001 {} +
        find /home/blagoy -group 9999 -exec chgrp -h 1001 {} +
      args:
        executable: /bin/bash
      changed_when: true

---
# To add a new worker tomorrow:
#   1. Add the host to [workers] in inventory.ini
#   2. Run: make slurm
# slurm.conf and /etc/hosts are regenerated from inventory on every run.

# ── Play 1: gather facts (needed to template slurm.conf with CPUs/RAM/hostnames) ──
- name: Gather facts from all cluster nodes
  hosts: cluster
  gather_facts: true
  tasks: []

# ── Play 2: common setup on every node ────────────────────────────────────────
- name: Common Slurm setup
  hosts: cluster
  become: true
  gather_facts: false
  tasks:
    - name: Create munge group with fixed GID
      ansible.builtin.group:
        name: munge
        gid: 992
        system: true
        state: present

    - name: Create munge user with fixed UID
      ansible.builtin.user:
        name: munge
        uid: 992
        group: munge
        system: true
        shell: /usr/sbin/nologin
        create_home: false

    - name: Create slurm group with fixed GID
      ansible.builtin.group:
        name: slurm
        gid: 991
        system: true
        state: present

    - name: Create slurm user with fixed UID
      ansible.builtin.user:
        name: slurm
        uid: 991
        group: slurm
        system: true
        shell: /usr/sbin/nologin
        create_home: false

    - name: Install munge and slurm-client
      ansible.builtin.apt:
        name:
          - munge
          - slurm-client
        state: present
        update_cache: true

    - name: Create /etc/slurm
      ansible.builtin.file:
        path: /etc/slurm
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Create /var/log/slurm
      ansible.builtin.file:
        path: /var/log/slurm
        state: directory
        owner: slurm
        group: slurm
        mode: '0755'

    - name: Write cluster node IPs to /etc/hosts
      ansible.builtin.blockinfile:
        path: /etc/hosts
        marker: "# {mark} SLURM CLUSTER NODES"
        block: |
          {% for host in groups['cluster'] %}
          {{ hostvars[host]['ansible_host'] }} {{ hostvars[host]['ansible_hostname'] }}
          {% endfor %}

    - name: Deploy slurm.conf
      ansible.builtin.template:
        src: ../templates/slurm.conf.j2
        dest: /etc/slurm/slurm.conf
        owner: slurm
        group: slurm
        mode: '0644'

    - name: Deploy cgroup.conf
      ansible.builtin.template:
        src: ../templates/cgroup.conf.j2
        dest: /etc/slurm/cgroup.conf
        owner: slurm
        group: slurm
        mode: '0644'

# ── Play 3: slurmctld on master ───────────────────────────────────────────────
- name: Configure Slurm controller (slurmctld)
  hosts: master
  become: true
  gather_facts: false
  tasks:
    - name: Install slurmctld
      ansible.builtin.apt:
        name: slurmctld
        state: present

    - name: Create /var/spool/slurmctld
      ansible.builtin.file:
        path: /var/spool/slurmctld
        state: directory
        owner: slurm
        group: slurm
        mode: '0700'

    - name: Generate munge key if absent
      ansible.builtin.command:
        cmd: dd if=/dev/urandom bs=1 count=1024 of=/etc/munge/munge.key
        creates: /etc/munge/munge.key

    - name: Fix munge key ownership and permissions
      ansible.builtin.file:
        path: /etc/munge/munge.key
        owner: munge
        group: munge
        mode: '0400'

    - name: Fetch munge key to control node
      ansible.builtin.fetch:
        src: /etc/munge/munge.key
        dest: /tmp/munge.key
        flat: true

    - name: Enable and start munge
      ansible.builtin.systemd:
        name: munge
        enabled: true
        state: restarted

    - name: Enable and start slurmctld
      ansible.builtin.systemd:
        name: slurmctld
        enabled: true
        state: restarted

# ── Play 4: slurmd on workers ─────────────────────────────────────────────────
- name: Configure Slurm compute nodes (slurmd)
  hosts: workers
  become: true
  gather_facts: false
  tasks:
    - name: Install slurmd
      ansible.builtin.apt:
        name: slurmd
        state: present

    - name: Create /var/spool/slurmd
      ansible.builtin.file:
        path: /var/spool/slurmd
        state: directory
        owner: slurm
        group: slurm
        mode: '0755'

    - name: Add slurm user to video group for GPU device access
      ansible.builtin.user:
        name: slurm
        groups: video
        append: true

    - name: Distribute munge key from control node
      ansible.builtin.copy:
        src: /tmp/munge.key
        dest: /etc/munge/munge.key
        owner: munge
        group: munge
        mode: '0400'

    - name: Deploy gres.conf
      ansible.builtin.template:
        src: ../templates/gres.conf.j2
        dest: /etc/slurm/gres.conf
        owner: slurm
        group: slurm
        mode: '0644'

    - name: Enable and start munge
      ansible.builtin.systemd:
        name: munge
        enabled: true
        state: restarted

    - name: Enable and start slurmd
      ansible.builtin.systemd:
        name: slurmd
        enabled: true
        state: restarted

# ── Play 5: verify ────────────────────────────────────────────────────────────
- name: Test Slurm with srun hostname
  hosts: master
  become: false
  gather_facts: false
  tags: test
  tasks:
    - name: Wait for slurmd to register with slurmctld
      ansible.builtin.pause:
        seconds: 8

    - name: Show cluster state
      ansible.builtin.command: sinfo
      register: sinfo_out
      changed_when: false

    - name: sinfo output
      ansible.builtin.debug:
        var: sinfo_out.stdout_lines

    - name: Run srun hostname
      ansible.builtin.command: srun --partition=compute --nodes=1 hostname
      register: srun_out
      changed_when: false

    - name: srun result
      ansible.builtin.debug:
        msg: "Worker responded: {{ srun_out.stdout }}"

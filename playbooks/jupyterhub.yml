---
# Play 1: gather facts — hub_connect_ip template var needs master's ansible_host
- name: Gather facts from all cluster nodes
  hosts: cluster
  gather_facts: true
  tasks: []

# Play 2: JupyterHub on master ─────────────────────────────────────────────────
- name: Install and configure JupyterHub
  hosts: master
  become: true
  gather_facts: false
  vars:
    jhub_venv: /opt/jupyterhub
  tasks:
    - name: Install Node.js, npm, and python3-venv
      ansible.builtin.apt:
        name:
          - nodejs
          - npm
          - python3.12-venv
        state: present
        update_cache: true

    - name: Install configurable-http-proxy
      ansible.builtin.command:
        cmd: npm install -g configurable-http-proxy
        creates: /usr/local/bin/configurable-http-proxy

    - name: Create JupyterHub virtualenv
      ansible.builtin.command:
        cmd: python3 -m venv {{ jhub_venv }}
        creates: "{{ jhub_venv }}/bin/python"

    - name: Install JupyterHub, JupyterLab, batchspawner into venv
      ansible.builtin.command:
        cmd: "{{ jhub_venv }}/bin/pip install jupyterhub jupyterlab notebook batchspawner"
      register: pip_out
      changed_when: "'Successfully installed' in pip_out.stdout"

    - name: Create JupyterHub config and runtime directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: root
        group: root
        mode: '0755'
      loop:
        - /etc/jupyterhub
        - /var/lib/jupyterhub

    # blagoy must exist on master for PAM auth; master user already exists there.
    - name: Create blagoy system user on master for JupyterHub login
      ansible.builtin.user:
        name: blagoy
        create_home: true
        shell: /bin/bash
        state: present

    - name: Open port 8000 in firewall
      ansible.builtin.command: ufw allow 8000/tcp
      changed_when: false
      failed_when: false

    - name: Deploy jupyterhub_config.py
      ansible.builtin.template:
        src: ../templates/jupyterhub_config.py.j2
        dest: /etc/jupyterhub/jupyterhub_config.py
        owner: root
        group: root
        mode: '0600'
      notify: restart jupyterhub

    - name: Deploy jupyterhub systemd service
      ansible.builtin.template:
        src: ../templates/jupyterhub.service.j2
        dest: /etc/systemd/system/jupyterhub.service
        owner: root
        group: root
        mode: '0644'
      notify: restart jupyterhub

    - name: Enable and start JupyterHub
      ansible.builtin.systemd:
        name: jupyterhub
        enabled: true
        state: started
        daemon_reload: true

  handlers:
    - name: restart jupyterhub
      ansible.builtin.systemd:
        name: jupyterhub
        state: restarted
        daemon_reload: true

# Play 3: GPU kernel on compute nodes ─────────────────────────────────────────
- name: Install GPU kernel on compute nodes
  hosts: gpu_nodes
  become: true
  gather_facts: false
  vars:
    worker_venv: /opt/jupyter-worker
  tasks:
    # master must exist on worker so Slurm can run jobs submitted by that user.
    # Also fixes the /home/master not found warning from the srun test.
    - name: Create master user on worker for Slurm job execution
      ansible.builtin.user:
        name: master
        create_home: true
        shell: /bin/bash
        state: present

    - name: Open notebook port range on worker firewall
      ansible.builtin.command: ufw allow 1024:65535/tcp
      changed_when: false
      failed_when: false

    - name: Install python3-venv on worker
      ansible.builtin.apt:
        name: python3.12-venv
        state: present
        update_cache: true

    - name: Create worker virtualenv
      ansible.builtin.command:
        cmd: python3 -m venv {{ worker_venv }}
        creates: "{{ worker_venv }}/bin/python"

    - name: Install jupyterhub-singleuser and kernel support into venv
      ansible.builtin.command:
        cmd: "{{ worker_venv }}/bin/pip install jupyterhub jupyterlab notebook ipykernel batchspawner"
      register: pip_out
      changed_when: "'Successfully installed' in pip_out.stdout"

    # PyTorch cu124 matches nvidia-driver-550 (CUDA 12.4 runtime capability).
    # ~2 GB download — this task takes several minutes.
    - name: Install PyTorch with CUDA 12.4 support into venv
      ansible.builtin.command:
        cmd: >
          {{ worker_venv }}/bin/pip install torch torchvision
          --index-url https://download.pytorch.org/whl/cu124
      register: pip_out
      changed_when: "'Successfully installed' in pip_out.stdout"

    - name: Register PyTorch GPU kernel system-wide
      ansible.builtin.command:
        cmd: >
          {{ worker_venv }}/bin/python -m ipykernel install
          --name pytorch-gpu
          --display-name "Python (PyTorch GPU)"
        creates: /usr/local/share/jupyter/kernels/pytorch-gpu/kernel.json
